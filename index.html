<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CasaBalance — Control de Gastos Familiar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet"/>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.15.3/Recharts.min.js"></script>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#0f1117;color:#e8eaed;min-height:100vh}
input,select,button{font-family:inherit}
table{width:100%;border-collapse:separate;border-spacing:0 4px;font-size:13px}
th{text-align:left;padding:8px 12px;color:#6b7280;text-transform:uppercase;font-size:11px;letter-spacing:1px}
td{padding:10px 12px}
::-webkit-scrollbar{height:6px;width:6px}
::-webkit-scrollbar-track{background:#0f1117}
::-webkit-scrollbar-thumb{background:#2a2d3a;border-radius:3px}
.online-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle;animation:pulse 2s infinite}
.online-dot.on{background:#4ade80;box-shadow:0 0 6px #4ade80}
.online-dot.off{background:#f87171;box-shadow:0 0 6px #f87171;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>
<body>
<div id="root"></div>
<script>
// Firebase config - mismo proyecto aqua-gest-ventas
var firebaseConfig = {
  apiKey: "AIzaSyBVQfGMFYpGMfMVYLRcOqqajcmG4ssfk28",
  authDomain: "aqua-gest-ventas.firebaseapp.com",
  projectId: "aqua-gest-ventas",
  storageBucket: "aqua-gest-ventas.appspot.com",
  messagingSenderId: "731aborrar",
  appId: "1:731848889498:web:casabalance"
};
// Init solo si no existe
if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}
var db = firebase.firestore();
</script>
<script type="text/babel">
var useState = React.useState;
var useEffect = React.useEffect;
var useMemo = React.useMemo;
var useCallback = React.useCallback;
var useRef = React.useRef;

var RC = window.Recharts;
var LineChart=RC.LineChart, Line=RC.Line, BarChart=RC.BarChart, Bar=RC.Bar, XAxis=RC.XAxis, YAxis=RC.YAxis, Tooltip=RC.Tooltip, Legend=RC.Legend, ResponsiveContainer=RC.ResponsiveContainer, PieChart=RC.PieChart, Pie=RC.Pie, Cell=RC.Cell;

var MONTHS=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
var PAYMENT_METHODS=["Efectivo","Tarjeta","Transferencia"];
var DEFAULT_RUBROS=["Alquiler","Supermercado","Servicios","Transporte","Salud","Educación","Entretenimiento","Ropa","Restaurantes","Otros"];
var DEFAULT_MEMBERS=["Miembro 1"];
var COLORS=["#2dd4bf","#f472b6","#818cf8","#fb923c","#facc15","#4ade80","#f87171","#38bdf8","#c084fc","#a3e635","#e879f9","#fbbf24"];

var uid=function(){return Math.random().toString(36).slice(2,9)};
var fmt=function(n){return new Intl.NumberFormat("es-AR",{style:"currency",currency:"ARS",maximumFractionDigits:0}).format(n)};
var todayStr=function(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")};
var monthKey=function(d){return d.slice(0,7)};
var monthLabel=function(mk){var p=mk.split("-");return MONTHS[parseInt(p[1])-1]+" "+p[0]};
var nowD=new Date();
var currentMK=nowD.getFullYear()+"-"+String(nowD.getMonth()+1).padStart(2,"0");

// ===== Firestore helper: single-doc store for config & arrays =====
var CONFIG_DOC = "casabalance_config";
var GASTOS_COL = "casabalance_gastos";
var INGRESOS_COL = "casabalance_ingresos";

function Modal(props){
  if(!props.open)return null;
  return(
    React.createElement("div",{onClick:props.onClose,style:{position:"fixed",inset:0,zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.55)",backdropFilter:"blur(4px)"}},
      React.createElement("div",{onClick:function(e){e.stopPropagation()},style:{background:"#1a1d27",borderRadius:16,padding:28,minWidth:320,maxWidth:520,width:"90%",maxHeight:"85vh",overflowY:"auto",boxShadow:"0 25px 60px rgba(0,0,0,0.4)",border:"1px solid #2a2d3a"}},
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <h3 style={{margin:0,fontSize:18,color:"#e8eaed"}}>{props.title}</h3>
          <button onClick={props.onClose} style={{background:"none",border:"none",color:"#6b7280",fontSize:22,cursor:"pointer",padding:4}}>✕</button>
        </div>,
        props.children
      )
    )
  );
}

function EditBtn(props){
  return <button onClick={props.onClick} title={props.label||"Editar"} style={{background:"none",border:"1px solid #2a2d3a",borderRadius:6,color:"#2dd4bf",cursor:"pointer",padding:"3px 8px",fontSize:13,display:"inline-flex",alignItems:"center",gap:4}}
    onMouseEnter={function(e){e.currentTarget.style.background="#2dd4bf";e.currentTarget.style.color="#fff";e.currentTarget.style.borderColor="#2dd4bf"}}
    onMouseLeave={function(e){e.currentTarget.style.background="none";e.currentTarget.style.color="#2dd4bf";e.currentTarget.style.borderColor="#2a2d3a"}}
  >✎ {props.label||""}</button>;
}

function DeleteBtn(props){
  return <button onClick={props.onClick} title="Eliminar" style={{background:"none",border:"1px solid #2a2d3a",borderRadius:6,color:"#f87171",cursor:"pointer",padding:"3px 8px",fontSize:13}}
    onMouseEnter={function(e){e.currentTarget.style.background="#f87171";e.currentTarget.style.color="#fff";e.currentTarget.style.borderColor="#f87171"}}
    onMouseLeave={function(e){e.currentTarget.style.background="none";e.currentTarget.style.color="#f87171";e.currentTarget.style.borderColor="#2a2d3a"}}
  >✕</button>;
}

function SelectInput(props){
  return <select value={props.value} onChange={function(e){props.onChange(e.target.value)}} style={Object.assign({padding:"9px 12px",borderRadius:8,border:"1px solid #2a2d3a",background:"#22252f",color:"#e8eaed",fontSize:14},props.style||{})}>
    {props.placeholder && <option value="">{props.placeholder}</option>}
    {props.options.map(function(o){return <option key={o} value={o}>{o}</option>})}
  </select>;
}

function TextInput(props){
  return <input type={props.type||"text"} value={props.value} onChange={function(e){props.onChange(e.target.value)}} placeholder={props.placeholder} min={props.min}
    style={Object.assign({padding:"9px 12px",borderRadius:8,border:"1px solid #2a2d3a",background:"#22252f",color:"#e8eaed",fontSize:14,width:"100%",boxSizing:"border-box"},props.style||{})}/>;
}

function PrimaryBtn(props){
  return <button onClick={props.onClick} disabled={props.disabled} style={Object.assign({background:props.disabled?"#6b7280":"#2dd4bf",color:"#fff",border:"none",borderRadius:8,padding:"10px 20px",fontSize:14,fontWeight:600,cursor:props.disabled?"not-allowed":"pointer"},props.style||{})}>{props.children}</button>;
}

function SecondaryBtn(props){
  return <button onClick={props.onClick} style={Object.assign({background:"transparent",color:"#2dd4bf",border:"1px solid #2dd4bf",borderRadius:8,padding:"8px 16px",fontSize:13,fontWeight:600,cursor:"pointer"},props.style||{})}>{props.children}</button>;
}

function Card(props){
  return <div style={Object.assign({background:"#1a1d27",borderRadius:14,padding:20,border:"1px solid #2a2d3a",boxShadow:"0 2px 12px rgba(0,0,0,0.08)"},props.style||{})}>{props.children}</div>;
}

function StatCard(props){
  return <Card style={{flex:"1 1 200px",minWidth:170}}>
    <div style={{fontSize:12,color:"#6b7280",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>{props.label}</div>
    <div style={{fontSize:24,fontWeight:700,color:props.color||"#e8eaed"}}>{props.value}</div>
    {props.sub && <div style={{fontSize:12,color:"#6b7280",marginTop:4}}>{props.sub}</div>}
  </Card>;
}

function Tabs(props){
  return <div style={{display:"flex",gap:4,background:"#0f1117",borderRadius:10,padding:3,marginBottom:20,flexWrap:"wrap"}}>
    {props.tabs.map(function(t){return <button key={t} onClick={function(){props.onChange(t)}} style={{padding:"8px 18px",borderRadius:8,border:"none",background:props.active===t?"#2dd4bf":"transparent",color:props.active===t?"#fff":"#6b7280",fontSize:13,fontWeight:600,cursor:"pointer"}}>{t}</button>})}
  </div>;
}

function App(){
  var[rubros,setRubros]=useState(DEFAULT_RUBROS);
  var[members,setMembers]=useState(DEFAULT_MEMBERS);
  var[gastos,setGastos]=useState([]);
  var[ingresos,setIngresos]=useState([]);
  var[tab,setTab]=useState("Dashboard");
  var[selMonth,setSelMonth]=useState(currentMK);
  var[online,setOnline]=useState(navigator.onLine);
  var[fbReady,setFbReady]=useState(false);

  var[showGasto,setShowGasto]=useState(false);
  var[showIngreso,setShowIngreso]=useState(false);
  var[showRubros,setShowRubros]=useState(false);
  var[showMembers,setShowMembers]=useState(false);
  var[editGasto,setEditGasto]=useState(null);
  var[editIngreso,setEditIngreso]=useState(null);

  var[gDesc,setGDesc]=useState("");
  var[gMonto,setGMonto]=useState("");
  var[gRubro,setGRubro]=useState("");
  var[gMetodo,setGMetodo]=useState("Efectivo");
  var[gCuotas,setGCuotas]=useState("1");
  var[gFecha,setGFecha]=useState(todayStr());

  var[iDesc,setIDesc]=useState("");
  var[iMonto,setIMonto]=useState("");
  var[iMember,setIMember]=useState("");
  var[iFecha,setIFecha]=useState(todayStr());

  // Online status
  useEffect(function(){
    var onOn=function(){setOnline(true)};
    var onOff=function(){setOnline(false)};
    window.addEventListener("online",onOn);
    window.addEventListener("offline",onOff);
    return function(){window.removeEventListener("online",onOn);window.removeEventListener("offline",onOff)};
  },[]);

  // Firebase real-time listeners
  useEffect(function(){
    // Config doc (rubros + members)
    var unsubConfig = db.collection("casabalance").doc("config").onSnapshot(function(doc){
      if(doc.exists){
        var data=doc.data();
        if(data.rubros) setRubros(data.rubros);
        if(data.members) setMembers(data.members);
      }
      setFbReady(true);
    }, function(err){
      console.error("Config listener error:",err);
      setFbReady(true);
    });

    // Gastos collection
    var unsubGastos = db.collection("casabalance").doc("data").collection("gastos").onSnapshot(function(snap){
      var arr=[];
      snap.forEach(function(d){arr.push(Object.assign({id:d.id},d.data()))});
      setGastos(arr);
    });

    // Ingresos collection
    var unsubIngresos = db.collection("casabalance").doc("data").collection("ingresos").onSnapshot(function(snap){
      var arr=[];
      snap.forEach(function(d){arr.push(Object.assign({id:d.id},d.data()))});
      setIngresos(arr);
    });

    return function(){unsubConfig();unsubGastos();unsubIngresos()};
  },[]);

  // Save config to Firestore
  var saveConfig = function(newRubros, newMembers){
    db.collection("casabalance").doc("config").set({
      rubros: newRubros || rubros,
      members: newMembers || members
    },{merge:true}).catch(function(e){console.error("Error saving config:",e)});
  };

  // Gastos CRUD via Firestore
  var saveGasto = function(){
    if(!gDesc||!gMonto||!gRubro)return;
    var obj={desc:gDesc,monto:parseFloat(gMonto),rubro:gRubro,metodo:gMetodo,cuotas:gMetodo==="Tarjeta"?parseInt(gCuotas)||1:1,fecha:gFecha};
    if(editGasto){
      db.collection("casabalance").doc("data").collection("gastos").doc(editGasto.id).set(obj)
        .catch(function(e){console.error(e)});
    } else {
      db.collection("casabalance").doc("data").collection("gastos").add(obj)
        .catch(function(e){console.error(e)});
    }
    setShowGasto(false);resetGastoForm();
  };

  var deleteGasto = function(id){
    if(confirm("¿Eliminar este gasto?")){
      db.collection("casabalance").doc("data").collection("gastos").doc(id).delete()
        .catch(function(e){console.error(e)});
    }
  };

  // Ingresos CRUD via Firestore
  var saveIngreso = function(){
    if(!iDesc||!iMonto||!iMember)return;
    var obj={desc:iDesc,monto:parseFloat(iMonto),member:iMember,fecha:iFecha};
    if(editIngreso){
      db.collection("casabalance").doc("data").collection("ingresos").doc(editIngreso.id).set(obj)
        .catch(function(e){console.error(e)});
    } else {
      db.collection("casabalance").doc("data").collection("ingresos").add(obj)
        .catch(function(e){console.error(e)});
    }
    setShowIngreso(false);resetIngresoForm();
  };

  var deleteIngreso = function(id){
    if(confirm("¿Eliminar este ingreso?")){
      db.collection("casabalance").doc("data").collection("ingresos").doc(id).delete()
        .catch(function(e){console.error(e)});
    }
  };

  // Cuotas expansion
  var gastosExpandidos=useMemo(function(){
    var all=[];
    gastos.forEach(function(g){
      var cuotas=parseInt(g.cuotas)||1;
      var montoCuota=g.monto/cuotas;
      for(var i=0;i<cuotas;i++){
        var d=new Date(g.fecha+"T12:00:00");
        d.setMonth(d.getMonth()+i);
        var mk=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
        all.push(Object.assign({},g,{monto:montoCuota,mes:mk,cuotaNum:i+1,cuotasTotal:cuotas,esOriginal:i===0}));
      }
    });
    return all;
  },[gastos]);

  var gastosMes=useMemo(function(){return gastosExpandidos.filter(function(g){return g.mes===selMonth})},[gastosExpandidos,selMonth]);
  var ingresosMes=useMemo(function(){return ingresos.filter(function(i){return monthKey(i.fecha)===selMonth})},[ingresos,selMonth]);

  var totalGastosMes=gastosMes.reduce(function(s,g){return s+g.monto},0);
  var totalIngresosMes=ingresosMes.reduce(function(s,i){return s+i.monto},0);
  var balanceMes=totalIngresosMes-totalGastosMes;

  var gastosPorRubro=useMemo(function(){
    var map={};
    gastosMes.forEach(function(g){map[g.rubro]=(map[g.rubro]||0)+g.monto});
    return Object.entries(map).sort(function(a,b){return b[1]-a[1]});
  },[gastosMes]);

  var gastosPorMetodo=useMemo(function(){
    var map={};
    gastosMes.forEach(function(g){map[g.metodo]=(map[g.metodo]||0)+g.monto});
    return Object.entries(map).sort(function(a,b){return b[1]-a[1]});
  },[gastosMes]);

  var evolucion=useMemo(function(){
    var ms=[];
    for(var i=11;i>=0;i--){
      var d=new Date();d.setMonth(d.getMonth()-i);
      var mk=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
      var ing=ingresos.filter(function(x){return monthKey(x.fecha)===mk}).reduce(function(s,x){return s+x.monto},0);
      var gas=gastosExpandidos.filter(function(x){return x.mes===mk}).reduce(function(s,x){return s+x.monto},0);
      ms.push({mes:monthLabel(mk),ingresos:ing,gastos:gas,balance:ing-gas});
    }
    return ms;
  },[gastosExpandidos,ingresos]);

  var availableMonths=useMemo(function(){
    var set=new Set();
    set.add(currentMK);
    gastos.forEach(function(g){
      var cuotas=parseInt(g.cuotas)||1;
      for(var i=0;i<cuotas;i++){
        var d=new Date(g.fecha+"T12:00:00");d.setMonth(d.getMonth()+i);
        set.add(d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"));
      }
    });
    ingresos.forEach(function(i){set.add(monthKey(i.fecha))});
    return Array.from(set).sort().reverse();
  },[gastos,ingresos]);

  var resetGastoForm=function(){setGDesc("");setGMonto("");setGRubro("");setGMetodo("Efectivo");setGCuotas("1");setGFecha(todayStr());setEditGasto(null)};
  var resetIngresoForm=function(){setIDesc("");setIMonto("");setIMember("");setIFecha(todayStr());setEditIngreso(null)};

  var openAddGasto=function(){resetGastoForm();setShowGasto(true)};
  var openEditGasto=function(g){setEditGasto(g);setGDesc(g.desc);setGMonto(String(g.monto));setGRubro(g.rubro);setGMetodo(g.metodo);setGCuotas(String(g.cuotas));setGFecha(g.fecha);setShowGasto(true)};

  var openAddIngreso=function(){resetIngresoForm();setShowIngreso(true)};
  var openEditIngreso=function(ing){setEditIngreso(ing);setIDesc(ing.desc);setIMonto(String(ing.monto));setIMember(ing.member);setIFecha(ing.fecha);setShowIngreso(true)};

  // Rubros
  var[newRubro,setNewRubro]=useState("");
  var addRubro=function(){
    if(newRubro.trim()&&!rubros.includes(newRubro.trim())){
      var nr=rubros.concat([newRubro.trim()]);
      setRubros(nr);
      saveConfig(nr,null);
      setNewRubro("");
    }
  };
  var removeRubro=function(r){
    var nr=rubros.filter(function(x){return x!==r});
    setRubros(nr);
    saveConfig(nr,null);
  };

  // Members
  var[newMember,setNewMember]=useState("");
  var addMember=function(){
    if(newMember.trim()&&!members.includes(newMember.trim())){
      var nm=members.concat([newMember.trim()]);
      setMembers(nm);
      saveConfig(null,nm);
      setNewMember("");
    }
  };
  var removeMember=function(m){
    var nm=members.filter(function(x){return x!==m});
    setMembers(nm);
    saveConfig(null,nm);
  };

  var ingresosPorMiembro=useMemo(function(){
    var map={};
    ingresosMes.forEach(function(i){map[i.member]=(map[i.member]||0)+i.monto});
    return Object.entries(map).sort(function(a,b){return b[1]-a[1]});
  },[ingresosMes]);

  var ttStyle={contentStyle:{background:"#1a1d27",border:"1px solid #2a2d3a",borderRadius:10,fontSize:13,color:"#e8eaed"},itemStyle:{color:"#e8eaed"}};

  return (
    <div>
      {/* HEADER */}
      <div style={{background:"linear-gradient(135deg,#1a1d27 0%,#0f1117 100%)",borderBottom:"1px solid #2a2d3a",padding:"16px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:38,height:38,borderRadius:10,background:"linear-gradient(135deg,#2dd4bf,#818cf8)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>💰</div>
          <div>
            <div style={{fontFamily:"'Space Mono',monospace",fontSize:18,fontWeight:700,letterSpacing:-0.5}}>CasaBalance</div>
            <div style={{fontSize:11,color:"#6b7280",display:"flex",alignItems:"center",gap:4}}>
              <span className={online?"online-dot on":"online-dot off"}></span>
              <span>{online?"Online":"Offline"}</span>
              <span style={{marginLeft:8}}>Control de gastos familiar</span>
            </div>
          </div>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <SecondaryBtn onClick={function(){setShowRubros(true)}}>✎ Rubros</SecondaryBtn>
          <SecondaryBtn onClick={function(){setShowMembers(true)}}>✎ Miembros</SecondaryBtn>
        </div>
      </div>

      {/* MONTH + TABS */}
      <div style={{padding:"16px 24px 0"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16,flexWrap:"wrap"}}>
          <span style={{fontSize:13,color:"#6b7280"}}>Período:</span>
          <SelectInput value={selMonth} onChange={setSelMonth} options={availableMonths} style={{minWidth:140}}/>
          <span style={{fontSize:20,fontWeight:700,marginLeft:8}}>{monthLabel(selMonth)}</span>
        </div>
        <Tabs tabs={["Dashboard","Gastos","Ingresos"]} active={tab} onChange={setTab}/>
      </div>

      <div style={{padding:"0 24px 40px"}}>

      {/* DASHBOARD */}
      {tab==="Dashboard" && <div>
        <div style={{display:"flex",gap:14,flexWrap:"wrap",marginBottom:20}}>
          <StatCard label="Ingresos" value={fmt(totalIngresosMes)} color="#4ade80"/>
          <StatCard label="Gastos" value={fmt(totalGastosMes)} color="#f87171"/>
          <StatCard label="Balance" value={fmt(balanceMes)} color={balanceMes>=0?"#4ade80":"#f87171"} sub={balanceMes>=0?"Superávit":"Déficit"}/>
          <StatCard label="Nº Gastos" value={gastosMes.length} sub={"en "+monthLabel(selMonth)}/>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(320px,1fr))",gap:14,marginBottom:20}}>
          <Card>
            <h4 style={{margin:"0 0 12px",fontSize:14,color:"#6b7280"}}>Gastos por Rubro</h4>
            {gastosPorRubro.length===0
              ? <div style={{color:"#6b7280",fontSize:13,padding:20,textAlign:"center"}}>Sin datos</div>
              : <ResponsiveContainer width="100%" height={250}>
                  <PieChart>
                    <Pie data={gastosPorRubro.map(function(r){return{name:r[0],value:r[1]}})} cx="50%" cy="50%" outerRadius={90} innerRadius={50} dataKey="value" paddingAngle={2}
                      label={function(p){return p.name+" "+Math.round(p.percent*100)+"%"}} style={{fontSize:11}}>
                      {gastosPorRubro.map(function(_,i){return <Cell key={i} fill={COLORS[i%COLORS.length]}/>})}
                    </Pie>
                    <Tooltip formatter={function(v){return fmt(v)}} {...ttStyle}/>
                  </PieChart>
                </ResponsiveContainer>
            }
          </Card>

          <Card>
            <h4 style={{margin:"0 0 12px",fontSize:14,color:"#6b7280"}}>Gastos por Medio de Pago</h4>
            {gastosPorMetodo.length===0
              ? <div style={{color:"#6b7280",fontSize:13,padding:20,textAlign:"center"}}>Sin datos</div>
              : <ResponsiveContainer width="100%" height={250}>
                  <PieChart>
                    <Pie data={gastosPorMetodo.map(function(r){return{name:r[0],value:r[1]}})} cx="50%" cy="50%" outerRadius={90} innerRadius={50} dataKey="value" paddingAngle={2}
                      label={function(p){return p.name+" "+Math.round(p.percent*100)+"%"}} style={{fontSize:11}}>
                      {gastosPorMetodo.map(function(_,i){return <Cell key={i} fill={["#2dd4bf","#818cf8","#f472b6"][i]||COLORS[i]}/>})}
                    </Pie>
                    <Tooltip formatter={function(v){return fmt(v)}} {...ttStyle}/>
                  </PieChart>
                </ResponsiveContainer>
            }
          </Card>
        </div>

        <Card style={{marginBottom:20}}>
          <h4 style={{margin:"0 0 12px",fontSize:14,color:"#6b7280"}}>Evolución Mensual — Ingresos vs Gastos (12 meses)</h4>
          <ResponsiveContainer width="100%" height={300}>
            <BarChart data={evolucion} barGap={2}>
              <XAxis dataKey="mes" tick={{fill:"#6b7280",fontSize:11}} axisLine={{stroke:"#2a2d3a"}} tickLine={false}/>
              <YAxis tick={{fill:"#6b7280",fontSize:11}} axisLine={{stroke:"#2a2d3a"}} tickLine={false} tickFormatter={function(v){return v>=1000?(v/1000).toFixed(0)+"k":v}}/>
              <Tooltip formatter={function(v){return fmt(v)}} {...ttStyle}/>
              <Legend wrapperStyle={{fontSize:12}}/>
              <Bar dataKey="ingresos" name="Ingresos" fill="#4ade80" radius={[4,4,0,0]}/>
              <Bar dataKey="gastos" name="Gastos" fill="#f87171" radius={[4,4,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </Card>

        <Card style={{marginBottom:20}}>
          <h4 style={{margin:"0 0 12px",fontSize:14,color:"#6b7280"}}>Balance Mensual</h4>
          <ResponsiveContainer width="100%" height={220}>
            <LineChart data={evolucion}>
              <XAxis dataKey="mes" tick={{fill:"#6b7280",fontSize:11}} axisLine={{stroke:"#2a2d3a"}} tickLine={false}/>
              <YAxis tick={{fill:"#6b7280",fontSize:11}} axisLine={{stroke:"#2a2d3a"}} tickLine={false} tickFormatter={function(v){return v>=1000?(v/1000).toFixed(0)+"k":v}}/>
              <Tooltip formatter={function(v){return fmt(v)}} {...ttStyle}/>
              <Line type="monotone" dataKey="balance" name="Balance" stroke="#2dd4bf" strokeWidth={2.5} dot={{r:4,fill:"#2dd4bf"}}/>
            </LineChart>
          </ResponsiveContainer>
        </Card>

        {ingresosPorMiembro.length>0 && <Card>
          <h4 style={{margin:"0 0 12px",fontSize:14,color:"#6b7280"}}>Aportes por Miembro — {monthLabel(selMonth)}</h4>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {ingresosPorMiembro.map(function(entry){
              var m=entry[0], v=entry[1];
              var pct=totalIngresosMes>0?(v/totalIngresosMes*100):0;
              return <div key={m}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}><span>{m}</span><span style={{fontWeight:600}}>{fmt(v)} ({pct.toFixed(0)}%)</span></div>
                <div style={{height:8,borderRadius:4,background:"#2a2d3a",overflow:"hidden"}}>
                  <div style={{width:pct+"%",height:"100%",background:"#4ade80",borderRadius:4,transition:"width .5s"}}/>
                </div>
              </div>;
            })}
          </div>
        </Card>}
      </div>}

      {/* GASTOS */}
      {tab==="Gastos" && <div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
          <h3 style={{margin:0,fontSize:16}}>Gastos — {monthLabel(selMonth)}</h3>
          <PrimaryBtn onClick={openAddGasto}>+ Nuevo Gasto</PrimaryBtn>
        </div>

        {gastosMes.length===0
          ? <Card><div style={{textAlign:"center",color:"#6b7280",padding:30}}>No hay gastos registrados para este mes.</div></Card>
          : <div style={{overflowX:"auto"}}>
              <table>
                <thead><tr>
                  <th>Fecha</th><th>Descripción</th><th>Rubro</th><th>Medio</th><th style={{textAlign:"right"}}>Monto</th><th style={{textAlign:"center"}}>Cuota</th><th style={{textAlign:"center"}}>Acciones</th>
                </tr></thead>
                <tbody>
                  {gastosMes.map(function(g,i){
                    return <tr key={g.id+"-"+g.cuotaNum} style={{background:i%2===0?"#1a1d27":"transparent"}}>
                      <td style={{borderRadius:"8px 0 0 8px"}}>{(g.fecha||"").slice(0,10)}</td>
                      <td>{g.desc}</td>
                      <td><span style={{background:"#0f1117",padding:"3px 10px",borderRadius:20,fontSize:12}}>{g.rubro}</span></td>
                      <td><span style={{color:g.metodo==="Tarjeta"?"#818cf8":g.metodo==="Transferencia"?"#2dd4bf":"#f472b6",fontWeight:600}}>{g.metodo}</span></td>
                      <td style={{textAlign:"right",fontWeight:600}}>{fmt(g.monto)}</td>
                      <td style={{textAlign:"center"}}>{g.cuotasTotal>1?g.cuotaNum+"/"+g.cuotasTotal:"—"}</td>
                      <td style={{textAlign:"center",borderRadius:"0 8px 8px 0"}}>
                        {g.esOriginal!==false && <div style={{display:"flex",gap:4,justifyContent:"center"}}>
                          <EditBtn onClick={function(){openEditGasto(gastos.find(function(x){return x.id===g.id}))}}/>
                          <DeleteBtn onClick={function(){deleteGasto(g.id)}}/>
                        </div>}
                      </td>
                    </tr>;
                  })}
                </tbody>
              </table>
            </div>
        }
        <Card style={{marginTop:16}}>
          <h4 style={{margin:"0 0 10px",fontSize:14,color:"#6b7280"}}>Resumen del mes</h4>
          <div style={{display:"flex",gap:24,flexWrap:"wrap",fontSize:14}}>
            <div><span style={{color:"#6b7280"}}>Total: </span><strong style={{color:"#f87171"}}>{fmt(totalGastosMes)}</strong></div>
            <div><span style={{color:"#6b7280"}}>Operaciones: </span><strong>{gastosMes.length}</strong></div>
          </div>
        </Card>
      </div>}

      {/* INGRESOS */}
      {tab==="Ingresos" && <div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
          <h3 style={{margin:0,fontSize:16}}>Ingresos — {monthLabel(selMonth)}</h3>
          <PrimaryBtn onClick={openAddIngreso}>+ Nuevo Ingreso</PrimaryBtn>
        </div>

        {ingresosMes.length===0
          ? <Card><div style={{textAlign:"center",color:"#6b7280",padding:30}}>No hay ingresos registrados para este mes.</div></Card>
          : <div style={{overflowX:"auto"}}>
              <table>
                <thead><tr>
                  <th>Fecha</th><th>Descripción</th><th>Miembro</th><th style={{textAlign:"right"}}>Monto</th><th style={{textAlign:"center"}}>Acciones</th>
                </tr></thead>
                <tbody>
                  {ingresosMes.map(function(ing,i){
                    return <tr key={ing.id} style={{background:i%2===0?"#1a1d27":"transparent"}}>
                      <td style={{borderRadius:"8px 0 0 8px"}}>{ing.fecha}</td>
                      <td>{ing.desc}</td>
                      <td><span style={{background:"#0f1117",padding:"3px 10px",borderRadius:20,fontSize:12}}>{ing.member}</span></td>
                      <td style={{textAlign:"right",fontWeight:600,color:"#4ade80"}}>{fmt(ing.monto)}</td>
                      <td style={{textAlign:"center",borderRadius:"0 8px 8px 0"}}>
                        <div style={{display:"flex",gap:4,justifyContent:"center"}}>
                          <EditBtn onClick={function(){openEditIngreso(ing)}}/>
                          <DeleteBtn onClick={function(){deleteIngreso(ing.id)}}/>
                        </div>
                      </td>
                    </tr>;
                  })}
                </tbody>
              </table>
            </div>
        }
        <Card style={{marginTop:16}}>
          <h4 style={{margin:"0 0 10px",fontSize:14,color:"#6b7280"}}>Resumen del mes</h4>
          <div style={{display:"flex",gap:24,flexWrap:"wrap",fontSize:14}}>
            <div><span style={{color:"#6b7280"}}>Total ingresos: </span><strong style={{color:"#4ade80"}}>{fmt(totalIngresosMes)}</strong></div>
            <div><span style={{color:"#6b7280"}}>Aportes: </span><strong>{ingresosMes.length}</strong></div>
          </div>
        </Card>
      </div>}

      </div>

      {/* MODALS */}
      <Modal open={showGasto} onClose={function(){setShowGasto(false);resetGastoForm()}} title={editGasto?"Editar Gasto":"Nuevo Gasto"}>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div><label style={{fontSize:12,color:"#6b7280",display:"block",marginBottom:4}}>Descripción</label><TextInput value={gDesc} onChange={setGDesc} placeholder="Ej: Compra supermercado"/></div>
          <div><label style={{fontSize:12,color:"#6b7280",display:"block",marginBottom:4}}>Monto total ($)</label><TextInput type="number" value={gMonto} onChange={setGMonto} placeholder="0" min="0"/></div>
          <div><label style={{fontSize:12,color:"#6b7280",display:"block",marginBottom:4}}>Rubro</label><SelectInput value={gRubro} onChange={setGRubro} options={rubros} placeholder="Seleccionar rubro" style={{width:"100%"}}/></div>
          <div><label style={{fontSize:12,color:"#6b7280",display:"block",marginBottom:4}}>Medio de pago</label><SelectInput value={gMetodo} onChange={function(v){setGMetodo(v);if(v!=="Tarjeta")setGCuotas("1")}} options={PAYMENT_METHODS} style={{width:"100%"}}/></div>
          {gMetodo==="Tarjeta" && <div>
            <label style={{fontSize:12,color:"#6b7280",display:"block",marginBottom:4}}>Cuotas</label>
            <TextInput type="number" value={gCuotas} onChange={setGCuotas} min="1" placeholder="1"/>
            {parseInt(gCuotas)>1 && gMonto && <div style={{fontSize:12,color:"#2dd4bf",marginTop:4}}>Cuota mensual: {fmt(parseFloat(gMonto)/parseInt(gCuotas))}</div>}
          </div>}
          <div><label style={{fontSize:12,color:"#6b7280",display:"block",marginBottom:4}}>Fecha</label><TextInput type="date" value={gFecha} onChange={setGFecha}/></div>
          <PrimaryBtn onClick={saveGasto} disabled={!gDesc||!gMonto||!gRubro} style={{marginTop:8}}>{editGasto?"Guardar cambios":"Registrar gasto"}</PrimaryBtn>
        </div>
      </Modal>

      <Modal open={showIngreso} onClose={function(){setShowIngreso(false);resetIngresoForm()}} title={editIngreso?"Editar Ingreso":"Nuevo Ingreso"}>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div><label style={{fontSize:12,color:"#6b7280",display:"block",marginBottom:4}}>Descripción</label><TextInput value={iDesc} onChange={setIDesc} placeholder="Ej: Sueldo mayo"/></div>
          <div><label style={{fontSize:12,color:"#6b7280",display:"block",marginBottom:4}}>Monto ($)</label><TextInput type="number" value={iMonto} onChange={setIMonto} placeholder="0" min="0"/></div>
          <div><label style={{fontSize:12,color:"#6b7280",display:"block",marginBottom:4}}>Miembro</label><SelectInput value={iMember} onChange={setIMember} options={members} placeholder="Seleccionar miembro" style={{width:"100%"}}/></div>
          <div><label style={{fontSize:12,color:"#6b7280",display:"block",marginBottom:4}}>Fecha</label><TextInput type="date" value={iFecha} onChange={setIFecha}/></div>
          <PrimaryBtn onClick={saveIngreso} disabled={!iDesc||!iMonto||!iMember} style={{marginTop:8}}>{editIngreso?"Guardar cambios":"Registrar ingreso"}</PrimaryBtn>
        </div>
      </Modal>

      <Modal open={showRubros} onClose={function(){setShowRubros(false)}} title="Editar Rubros">
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
          {rubros.map(function(r){return <div key={r} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:"#0f1117",borderRadius:8}}>
            <span style={{fontSize:14}}>{r}</span>
            <DeleteBtn onClick={function(){removeRubro(r)}}/>
          </div>})}
        </div>
        <div style={{display:"flex",gap:8}}>
          <TextInput value={newRubro} onChange={setNewRubro} placeholder="Nuevo rubro..." style={{flex:1}}/>
          <PrimaryBtn onClick={addRubro} disabled={!newRubro.trim()}>Agregar</PrimaryBtn>
        </div>
      </Modal>

      <Modal open={showMembers} onClose={function(){setShowMembers(false)}} title="Editar Miembros">
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
          {members.map(function(m){return <div key={m} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:"#0f1117",borderRadius:8}}>
            <span style={{fontSize:14}}>{m}</span>
            <DeleteBtn onClick={function(){removeMember(m)}}/>
          </div>})}
        </div>
        <div style={{display:"flex",gap:8}}>
          <TextInput value={newMember} onChange={setNewMember} placeholder="Nuevo miembro..." style={{flex:1}}/>
          <PrimaryBtn onClick={addMember} disabled={!newMember.trim()}>Agregar</PrimaryBtn>
        </div>
      </Modal>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
